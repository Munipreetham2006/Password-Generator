<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Password Generator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    }

    .container{
      width:400px;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      text-align:center;
    }

    h1{
      margin-bottom:20px;
      color:#203a43;
    }

    input[type="number"]{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:2px solid #ccc;
      border-radius:10px;
      font-size:16px;
    }

    .options{
      text-align:left;
      margin:15px 0;
    }

    .options label{
      display:block;
      margin:10px 0;
      font-size:15px;
    }

    button{
      width:100%;
      padding:12px;
      background:#203a43;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#2c5364;
    }

    .result{
      margin-top:20px;
      display:flex;
      gap:10px;
    }

    .result input{
      flex:1;
      padding:12px;
      border:2px solid #ccc;
      border-radius:10px;
      font-size:15px;
    }

    .copy-btn{
      width:100px;
      background:#28a745;
    }

    .copy-btn:hover{
      background:#218838;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Password Generator</h1>

    <input type="number" id="length" placeholder="Enter Password Length">

    <div class="options">
      <label>
        <input type="checkbox" id="letters" checked>
        Include Letters
      </label>

      <label>
        <input type="checkbox" id="numbers" checked>
        Include Numbers
      </label>

      <label>
        <input type="checkbox" id="symbols" checked>
        Include Symbols
      </label>
    </div>

    <button onclick="generatePassword()">
      Generate Password
    </button>

    <div class="result">
      <input type="text" id="password" readonly>
      <button class="copy-btn" onclick="copyPassword()">
        Copy
      </button>
    </div>

  </div>

  <script>

    function generatePassword(){

      let length = document.getElementById("length").value;

      let includeLetters = document.getElementById("letters").checked;
      let includeNumbers = document.getElementById("numbers").checked;
      let includeSymbols = document.getElementById("symbols").checked;

      let letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let numbers = "0123456789";
      let symbols = "!@#$%^&*()_+?><:{}[]";

      let characters = "";

      if(includeLetters){
        characters += letters;
      }

      if(includeNumbers){
        characters += numbers;
      }

      if(includeSymbols){
        characters += symbols;
      }

      if(characters === ""){
        alert("Please select at least one option");
        return;
      }

      if(length <= 0){
        alert("Enter valid password length");
        return;
      }

      let password = "";

      for(let i=0; i<length; i++){
        password += characters.charAt(
          Math.floor(Math.random() * characters.length)
        );
      }

      document.getElementById("password").value = password;
    }

    function copyPassword(){

      let passwordField = document.getElementById("password");

      passwordField.select();
      passwordField.setSelectionRange(0, 99999);

      navigator.clipboard.writeText(passwordField.value);

      alert("Password Copied!");
    }

  </script>

</body>
</html>
